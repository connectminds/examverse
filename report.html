<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#8b5cf6" />
<meta name="description" content="View your exam results and analytics on ExamVerse." />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Report Sheet | ExamVerse</title>
<link rel="manifest" href="/manifest.json" />
<link rel="stylesheet" href="report.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<!-- Watermark -->
<div class="watermark-bg">EXAMVERSE</div>

<!-- Floating Bubbles -->
<div class="bubble-layer" id="bubbleLayer"></div>

<div class="report-container glass-modal">
    <div class="report-header">
        <div class="student-info">
            <img id="studentPhoto" src="" alt="Student Photo" class="student-photo">
            <div class="student-text">
                <span id="studentName"></span>
                <span id="studentID" class="student-id"></span>
            </div>
        </div>
        <div class="report-actions">
            <a href="subject.html" class="back-link">← Back to Subjects</a>
            <button class="print-btn" id="emailBtn" title="Email this result to yourself">
                <i class="fas fa-envelope"></i> Email Result
            </button>
            <button class="print-btn" onclick="window.print()">Print Report</button>
            <button class="share-btn" id="shareBtn" title="Share this report">
                <i class="fas fa-share"></i> Share
            </button>
            <button class="download-btn" id="downloadBtn" title="Download as PDF">
                <i class="fas fa-download"></i> Download
            </button>
        </div>
    </div>

    <h1>Exam Report Sheet</h1>

    <!-- Student Performance Summary -->
    <div class="performance-summary">
        <div class="performance-left">
            <div class="student-details-section">
                <h3>Student Performance</h3>
                <div class="detail-row">
                    <span class="detail-label">Time Taken:</span>
                    <span class="detail-value" id="timeTaken">00:00</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Score:</span>
                    <span class="detail-value" id="scorePercentage">0%</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Performance:</span>
                    <span class="detail-value" id="performanceFeedback">—</span>
                </div>
            </div>
        </div>
        <div class="performance-right">
            <div class="comments-box">
                <h3><i class="fas fa-lightbulb"></i>Comment On Performance</h3>
                <p id="teacherComment"></p>
            </div>
        </div>
    </div>

    <!-- Summary Table -->
    <table class="summary-table">
        <tr>
            <th>Total Questions</th>
            <th>Attempted</th>
            <th>Correct</th>
            <th>Incorrect</th>
            <th>Grade</th>
        </tr>
        <tr>
            <td id="total"></td>
            <td id="attempted"></td>
            <td id="correct"></td>
            <td id="incorrect"></td>
            <td id="grade"></td>
        </tr>
    </table>

    <div class="charts">
        <div class="chart-container">
            <canvas id="barChart"></canvas>
        </div>
        <div class="chart-container">
            <canvas id="pieChart"></canvas>
        </div>
    </div>

    <div class="explanations">
        <h2>Explanations for Incorrect Answers</h2>
        <ul id="explanationList"></ul>
    </div>
</div>

<script src="pwa-init.js"></script>
<script src="user-profile.js"></script>
<script src="notification-service.js"></script>
<script src="report.js"></script>
<script src="bubbles.js"></script>

<script>
document.getElementById('shareBtn').addEventListener('click', shareReport);
document.getElementById('downloadBtn').addEventListener('click', downloadReport);

function shareReport() {
    const element = document.querySelector('.report-container');
    const options = {
        margin: 0.5,
        filename: 'exam-report.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
    };

    html2pdf().set(options).from(element).outputPdf().then((pdf) => {
        const blob = new Blob([pdf], { type: 'application/pdf' });
        const file = new File([blob], 'exam-report.pdf', { type: 'application/pdf' });

        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
            navigator.share({
                title: 'Exam Report Sheet',
                text: 'Check out my exam performance report from ExamVerse!',
                files: [file]
            }).then(() => console.log('Report shared successfully'))
              .catch((error) => console.log('Error sharing:', error));
        } else {
            // Fallback: Download and suggest sharing
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'exam-report.pdf';
            a.click();
            URL.revokeObjectURL(url);
            alert('PDF downloaded. Share it manually from your downloads.');
        }
    });
}

function downloadReport() {
    const element = document.querySelector('.report-container');
    const options = {
        margin: 0.5,
        filename: 'exam-report.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
    };

    html2pdf().set(options).from(element).save();
}
</script>
</body>
</html>
